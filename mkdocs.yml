site_name: Documentation
site_url: https://axf504.github.io/Docu_template/
theme:
  name: material
  custom_dir: overrides
  features:
    - navigation.tabs
    - navigation.sections
    - search.suggest
  palette:
    primary: custom

extra:
  generator: false

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - md_in_html

nav:
  - Home: index.md
  - Getting Started:
    - Quick Start: getting-started/quickstart.md
    - Room Setup: getting-started/room-setup.md
  - Basic Use:
    - Sending Content: basic-use/send-content.md
    - Anchor Menu: basic-use/anchor-menu.md
  - Advanced Features: advanced/advanced-features.md
  - Troubleshooting: troubleshooting.md
  - Developer Docs:
    - API Reference: developer/api-reference.md
    - SDK Guide: developer/sdk.md
  - Release Notes: release-notes.md
